################################################################################
# BOM SERVICE - CONFIGURACIÓN PRINCIPAL
# 
# Esta es la configuración por defecto para DESARROLLO
# 
# PARA CAMBIAR DE AMBIENTE, ejecuta con los siguientes comandos:
# 
# DESARROLLO (por defecto): 
#   mvn spring-boot:run
#   java -jar app.jar
# 
# TEST:
#   mvn test
#   mvn spring-boot:run -Dspring-boot.run.arguments="--spring.profiles.active=test"
# 
# PRODUCCIÓN:
#   java -jar app.jar --spring.profiles.active=prod
#   OR: export SPRING_PROFILES_ACTIVE=prod && java -jar app.jar
#
################################################################################

spring.application.name=bom-service
server.port=8080

# Perfil activo por defecto (desarrollo)
spring.profiles.active=dev

# ========== APPLICATION CONFIGURATION ==========
server.servlet.context-path=/

# ========== H2 DATABASE CONFIGURATION (DEVELOPMENT) ==========
# Base de datos H2 en memoria para desarrollo y testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ========== H2 CONSOLE ==========
# Interfaz gráfica de H2 para consultar la base de datos
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ========== JPA/HIBERNATE CONFIGURATION ==========
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ========== LOGGING CONFIGURATION ==========
logging.level.root=INFO
logging.level.com.michaelrodriguez.mrp=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ========== SWAGGER/OPENAPI CONFIGURATION ==========
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.enabled=true

# ========== DEVELOPMENT TOOLS ==========
# DevTools para desarrollo (recargar en cambios)
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

