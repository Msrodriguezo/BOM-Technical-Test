################################################################################
# APPLICATION PROPERTIES - AMBIENTE: DESARROLLO (DEFAULT)
# Se activa por defecto cuando no se especifica un perfil
# Ejecutar con: mvn spring-boot:run (sin argumentos)
################################################################################

spring.application.name=bom-service
server.port=8080

# ========== DEVELOPMENT LOG CONFIGURATION ==========
logging.level.root=INFO
logging.level.com.michaelrodriguez.mrp=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# ========== H2 DATABASE CONFIGURATION ==========
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ========== H2 CONSOLE CONFIGURATION ==========
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ========== JPA/HIBERNATE CONFIGURATION ==========
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ========== SWAGGER/OPENAPI CONFIGURATION ==========
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ========== DEVELOPMENT MODE SETTINGS ==========
# Habilita recargar on change (si usas DevTools)
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

################################################################################
# FIN CONFIGURACIÓN DESARROLLO
################################################################################
