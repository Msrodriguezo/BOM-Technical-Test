################################################################################
# APPLICATION PROPERTIES - AMBIENTE: PRODUCCIÓN
# Se activa en entorno de producción
# Ejecutar con: java -jar app.jar --spring.profiles.active=prod
# O variable de entorno: SPRING_PROFILES_ACTIVE=prod
################################################################################

spring.application.name=bom-service
server.port=8080

# ========== PRODUCTION LOG CONFIGURATION ==========
# Solo WARN y ERROR en producción para reducir overhead
logging.level.root=WARN
logging.level.com.michaelrodriguez.mrp=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.boot=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %level - %msg%n
logging.file.name=/var/log/bom-service/application.log
logging.file.max-size=10MB
logging.file.max-history=10

# ========== DATABASE CONFIGURATION - POSTGRESQL ==========
# En producción, usar base de datos relacional real (PostgreSQL)
# Cambiar estas propiedades según tu BD de producción
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bom_service}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:bom_user}
spring.datasource.password=${DB_PASSWORD:secure_password}

# ========== CONNECTION POOL CONFIGURATION ==========
# HikariCP para mejor rendimiento (es el default en Spring Boot)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# ========== JPA/HIBERNATE CONFIGURATION ==========
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# ========== SWAGGER/OPENAPI CONFIGURATION ==========
# IMPORTANTE: Deshabilitar Swagger en producción por seguridad
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ========== SERVER CONFIGURATION ==========
# Compresión HTTP para reducir bandawdith
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.excluded-media-types=image/png,image/jpeg,image/gif,image/webp

# ========== SERVLET CONFIGURATION ==========
server.servlet.context-path=/
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# ========== PRODUCTION SECURITY SETTINGS ==========
# Sesiones HTTP
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m

# ========== DEVTOOLS DISABLED ==========
# Nunca habilitar DevTools en producción
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# ========== CACHE CONFIGURATION ==========
# Habilitar caché en producción para mejor rendimiento
spring.cache.type=simple

# ========== JVM GARBAGE COLLECTION ==========
# Optimizaciones para producción (usar -Xmx, -Xms en comando de ejecución)

# ========== ACTUATOR CONFIGURATION ==========
# SI usas Spring Boot Actuator para monitoreo
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# ========== ENVIRONMENT VARIABLES RECOMENDADAS ==========
# Exportar estas variables al servidor de producción:
# export DB_HOST=your-prod-db-host
# export DB_PORT=5432
# export DB_NAME=bom_service
# export DB_USERNAME=bom_user
# export DB_PASSWORD=your-secure-password
# export SPRING_PROFILES_ACTIVE=prod

################################################################################
# FIN CONFIGURACIÓN PRODUCCIÓN
# 
# IMPORTANTE PARA DEPLOY:
# 1. Cambiar DB_HOST, DB_NAME, DB_USERNAME, DB_PASSWORD según tu BD
# 2. Asegurar que PostgreSQL esté instalado y corriendo
# 3. Usar HTTPS en el API Gateway o reverse proxy (Nginx/Apache)
# 4. Implementar autenticación (JWT, OAuth)
# 5. Habilitar CORS solo para dominios confiables
# 6. Configurar backups de base de datos
# 7. Monitorear logs con: tail -f /var/log/bom-service/application.log
################################################################################
