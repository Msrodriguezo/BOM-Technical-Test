################################################################################
# APPLICATION PROPERTIES - AMBIENTE: TEST
# Se activa para pruebas automatizadas
# Ejecutar con: mvn test
# O en JUnit: @ActiveProfiles("test")
################################################################################

spring.application.name=bom-service
server.port=8080

# ========== TEST LOG CONFIGURATION ==========
# Menos verboso en test para evitar ruido en los logs
logging.level.root=WARN
logging.level.com.michaelrodriguez.mrp=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ========== H2 DATABASE CONFIGURATION ==========
# H2 en memoria para tests rápidos y aislados
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ========== H2 CONSOLE CONFIGURATION ==========
# Generalmente deshabilitado en test, pero disponible si es necesario
spring.h2.console.enabled=false

# ========== JPA/HIBERNATE CONFIGURATION ==========
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ========== SWAGGER/OPENAPI CONFIGURATION ==========
# Deshabilitado en test para optimizar rendimiento
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ========== TEST MODE SETTINGS ==========
# Desahabilita DevTools en test
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# No persistir datos entre tests
spring.jpa.hibernate.use-new-id-generator-mappings=true

# ========== CACHE CONFIGURATION ==========
# Deshabilita caché para test aislado
spring.cache.type=none

################################################################################
# FIN CONFIGURACIÓN TEST
################################################################################
